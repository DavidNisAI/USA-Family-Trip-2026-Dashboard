  }
  .search input:focus { border-color: #4f46e5; }
  .search::before { content: "🔍"; position:absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity:.6; }

  }
  .chip:hover { background: #e5e7eb; }
  .chip.active { background: #4f46e5; color: white; box-shadow: 0 2px 6px rgba(79,70,229,.3); }

  .day-head .right { display:flex; align-items:center; gap:12px; text-align: right; }
  .day-emoji { font-size: 28px; }
  .day-date { font-size: 19px; font-weight: 800; }
  .day-sub { font-size: 13px; opacity:.95; }
  .pill { background: rgba(255,255,255,.22); padding: 4px 10px; border-radius: 14px; font-size: 12px; font-weight: 600; }
  .chev { width: 20px; height: 20px; transition: transform .25s; }
  .open .chev { transform: rotate(180deg); }
  .day-body { display:none; padding: 12px; }
  .open .day-body { display: block; }

  .item {

  .item .title { font-weight: 700; color: #111827; font-size: 14px; }

  .item .title a:hover { color: #4338ca; border-bottom-style: solid; }
  .map-btn {
    display:inline-flex; align-items:center; gap:3px;
    text-decoration:none; background:#eef2ff; color:#4f46e5;
    padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: 700;
    border: 1px solid #c7d2fe; transition: all .2s;

  .map-btn:hover { background: #4f46e5; color: white; border-color: #4f46e5; }
  .item .time { font-size: 11px; padding: 2px 8px; border-radius: 8px; border: 1px solid #d1d5db; background: white; color: #4b5563; font-weight: 600; }

    background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c;

  .notes-box b { display:block; margin-bottom: 4px; }
  .notes-box ul { margin: 0; padding-right: 18px; font-size: 13px; }

  .empty { text-align: center; color: #9ca3af; padding: 30px; }

const state = {
  tab: 'schedule',
  search: '',
  cat: 'all',
  expanded: Object.fromEntries(DATA.DAYS.map((_, i) => [i, true])),
  todos: loadTodos(),
};

function loadTodos() {
  try {
    const saved = JSON.parse(localStorage.getItem('usa_trip_todos') || 'null');
    if (Array.isArray(saved) && saved.length === DATA.TODOS.length) return saved;
  } catch(e){}
  return DATA.TODOS.map(t => ({ text: t, done: false }));
}
function saveTodos() {
  try { localStorage.setItem('usa_trip_todos', JSON.stringify(state.todos)); } catch(e){}
}

document.getElementById('stat-acts').textContent  = DATA.DAYS.reduce((s,d)=>s+d.items.length,0);
document.getElementById('stat-rooms').textContent = DATA.HOTELS.reduce((s,h)=>s+h.rooms.length,0) + DATA.FLIGHT_BOOKINGS.length;
document.getElementById('stat-games').textContent = DATA.GAMES.length;

const TABS = [
  { id: 'schedule',  label: '📅 לוח יומי' },
  { id: 'hotels',    label: '🏨 מלונות' },
  { id: 'transport', label: '✈️ טיסות והסעות' },
  { id: 'games',     label: '🏈 משחקים' },
  { id: 'todos',     label: '☑️ משימות' },
];
function renderTabs() {
  const open = state.todos.filter(t => !t.done).length;
  const el = document.getElementById('tabs');
  el.innerHTML = TABS.map(t => {
    const label = t.id === 'todos' ? `☑️ משימות (${open})` : t.label;
    return `<button class="tab ${state.tab===t.id?'active':''}" data-tab="${t.id}">${label}</button>`;
  }).join('');
  el.querySelectorAll('.tab').forEach(b => b.onclick = () => { state.tab = b.dataset.tab; render(); });
}

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function mapsUrl(q) { return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q); }

// Match item text against PLACES list, return Google Maps URL or null
function findMapsQuery(text) {
  if (!text) return null;
  for (const [key, q] of DATA.PLACES) {
    if (text.indexOf(key) !== -1) return q;
  }
  return null;
}

function titleWithMap(title, note) {
  const text = title + ' ' + (note || '');
  const q = findMapsQuery(text);
  if (q) {
    return `<a href="${mapsUrl(q)}" target="_blank" rel="noopener">${esc(title)}</a> <a class="map-btn" href="${mapsUrl(q)}" target="_blank" rel="noopener">📍 מפה</a>`;
  }
  return esc(title);
}

// ===== SCHEDULE =====
function renderSchedule() {
  const q = state.search.trim().toLowerCase();
  const filtered = DATA.DAYS.map((d, idx) => {
    const items = d.items.filter(it => {
      const okCat = state.cat === 'all' || it.cat === state.cat;
      const okTxt = !q || (it.title + ' ' + it.note + ' ' + d.date + ' ' + d.dow).toLowerCase().includes(q);
      return okCat && okTxt;
    });
    return { ...d, items, _i: idx };
  }).filter(d => d.items.length > 0);

  const toolbar = `
    <div class="card section">
      <div class="card-pad toolbar">
        <div class="search"><input id="search-input" placeholder="חיפוש (מסעדה, אטרקציה, תאריך...)" value="${esc(state.search)}"></div>
        <div class="chips">
          <button class="chip ${state.cat==='all'?'active':''}" data-cat="all">הכל</button>
          ${Object.entries(DATA.CATS).map(([k,v])=>`<button class="chip ${state.cat===k?'active':''}" data-cat="${k}">${v.emoji} ${esc(v.label)}</button>`).join('')}
        </div>
      </div>
    </div>`;

  let cardsHtml = '';
  if (filtered.length === 0) {
    cardsHtml = `<div class="card"><div class="empty">לא נמצאו תוצאות</div></div>`;
  } else {
    cardsHtml = filtered.map(d => {
      const isOpen = state.expanded[d._i];
      const itemsHtml = d.items.map(it => {
        const c = DATA.CATS[it.cat] || DATA.CATS.attraction;
        return `
          <div class="item">
            <div class="ic" style="background:${c.color}22;color:${c.color}">${c.emoji}</div>
            <div class="body">
              <div class="row1">
                <span class="title">${titleWithMap(it.title, it.note)}</span>
                ${it.time ? `<span class="time">${esc(it.time)}</span>` : ''}
              </div>
              ${it.note ? `<div class="note">${esc(it.note)}</div>` : ''}
            </div>
          </div>`;
      }).join('');
      const notesHtml = (d.notes && d.notes.length) ? `
        <div class="notes-box">
          <b>⚠️ שים לב</b>
          <ul>${d.notes.map(n=>`<li>${esc(n)}</li>`).join('')}</ul>
        </div>` : '';
      return `
        <div class="card ${isOpen?'open':''}" data-day-card="${d._i}">
          <button class="day-head" data-toggle="${d._i}" style="background: linear-gradient(120deg, ${d.color}, ${d.color}cc)">
            <div class="right">
              <span class="day-emoji">${d.emoji}</span>
              <div>
                <div class="day-date">${esc(d.date)}</div>
                <div class="day-sub">${esc(d.dow)} · ${esc(d.title)}</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="pill">${d.items.length} פריטים</span>
              <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </button>
          <div class="day-body">${itemsHtml}${notesHtml}</div>
        </div>`;
    }).join('');
  }
  return toolbar + cardsHtml;
}

function renderTodos() {
  const done = state.todos.filter(t => t.done).length;
  const pct = Math.round((done / state.todos.length) * 100);
  return `
    <div class="card">
      <div class="todo-head">
        <div class="top">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="font-size:28px">☑️</div>
            <div><h3>משימות פתוחות</h3><p>${done} מתוך ${state.todos.length} הושלמו</p></div>
          </div>
          <div class="pct">${pct}%</div>
        </div>
        <div class="todo-bar"><div class="todo-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="card-pad">
        ${state.todos.map((t,i)=>`
          <button class="todo ${t.done?'done':''}" data-todo="${i}">
            <span class="box">${t.done ? '✅' : '⬜'}</span>
            <span style="flex:1">${esc(t.text)}</span>
          </button>`).join('')}
      </div>
    </div>`;
}

  if (state.tab === 'games')     html = renderGames();
  if (state.tab === 'todos')     html = renderTodos();
  const c = document.getElementById('content');
  c.innerHTML = `<div class="pane">${html}</div>`;
  bindEvents();
}

function bindEvents() {
  if (state.tab === 'schedule') {
    const si = document.getElementById('search-input');
    if (si) si.addEventListener('input', e => { state.search = e.target.value; renderScheduleOnly(); });
    document.querySelectorAll('.chip').forEach(b => b.onclick = () => { state.cat = b.dataset.cat; renderScheduleOnly(); });
    document.querySelectorAll('[data-toggle]').forEach(b => b.onclick = () => {
      const i = +b.dataset.toggle; state.expanded[i] = !state.expanded[i]; renderScheduleOnly();
    });
  }
  if (state.tab === 'todos') {
    document.querySelectorAll('[data-todo]').forEach(b => b.onclick = () => {
      const i = +b.dataset.todo; state.todos[i].done = !state.todos[i].done;
      saveTodos(); render();
    });
  }
}

function renderScheduleOnly() {
  const focused = document.activeElement && document.activeElement.id === 'search-input';
  const selStart = focused ? document.activeElement.selectionStart : null;
  const c = document.getElementById('content');
  c.innerHTML = `<div class="pane">${renderSchedule()}</div>`;
  const si = document.getElementById('search-input');
  if (si) {
    si.addEventListener('input', e => { state.search = e.target.value; renderScheduleOnly(); });
    if (focused) { si.focus(); try { si.setSelectionRange(selStart, selStart); } catch(e){} }
  }
  document.querySelectorAll('.chip').forEach(b => b.onclick = () => { state.cat = b.dataset.cat; renderScheduleOnly(); });
  document.querySelectorAll('[data-toggle]').forEach(b => b.onclick = () => {
    const i = +b.dataset.toggle; state.expanded[i] = !state.expanded[i]; renderScheduleOnly();
  });
}

render();
</script>
</body>
</html>
